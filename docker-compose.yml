services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fhir-app
    working_dir: /var/www/html
    command: sh -c "mkdir -p storage/logs storage/framework/cache storage/framework/sessions storage/framework/views bootstrap/cache && chown -R www-data:www-data storage bootstrap/cache && php-fpm"
    volumes:
      - ./:/var/www/html
      - vendor-data:/var/www/html/vendor
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      - db

  web:
    image: nginx:1.27-alpine
    container_name: fhir-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - storage-data:/var/www/html/storage
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.4
    container_name: fhir-db
    environment:
      MYSQL_DATABASE: fhir
      MYSQL_USER: fhir
      MYSQL_PASSWORD: 123456
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: fhir-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: fhir
      PMA_PASSWORD: 123456
    depends_on:
      - db

  node:
    image: node:20-alpine
    container_name: fhir-node
    working_dir: /var/www/html
    command: sh -c "if [ ! -d node_modules/.bin ]; then npm install; fi && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules

volumes:
  db-data:
  node-modules:
  vendor-data:
  storage-data:
  bootstrap-cache:
